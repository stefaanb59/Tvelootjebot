<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tvelootjebot Chatbox</title>
    <script src="https://cdn.jsdelivr.net/npm/@botfront/rasa-webchat@1.0.1/lib/index.min.js"></script>
</head>
<body>
    <div id="webchat"></div>

    <script>
      WebChat.default.init({
        selector: "#webchat",
        initPayload: "/greet",
        customData: { language: "nl" },
        socketUrl: "https://tvelootjebot.onrender.com",  // Pas aan naar jouw Rasa URL
        title: "Tvelootjebot",
        subtitle: "Fietsherstellingen"
      });
    </script>
</body>
</html>
